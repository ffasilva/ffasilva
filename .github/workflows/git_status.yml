name: Update README cards

on:
  schedule:
    - cron: "48 * * * *" # "0 0 * * *" # Runs once daily at midnight
      timezone: "Europe/London"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&include_all_commits=true&hide=stars&show=prs_merged&show_icons=true&theme=tokyonight
          path: profile/stats.svg
          token: ${{ secrets.stats-self-deploy }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=tokyonight
          path: profile/top-langs.svg
          token: ${{ secrets.stats-self-deploy }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
